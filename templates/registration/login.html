<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plasmaERP | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md border border-gray-200">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-wider text-gray-800 mb-2">
                plasma<span class="text-blue-500">ERP</span>
            </h1>
            <p class="text-sm text-gray-500">Sign in to your account</p>
        </div>

        {% if form.errors %}
        <div class="bg-red-50 text-red-500 p-3 rounded mb-4 text-sm border border-red-200">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                    Username
                </label>
                <input
                    class="shadow-sm appearance-none border border-gray-300 rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    id="username" name="username" type="text" required autofocus>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    Password
                </label>
                <input
                    class="shadow-sm appearance-none border border-gray-300 rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    id="password" name="password" type="password" required>
            </div>

            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center">
                    <input id="remember_me" type="checkbox"
                        class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember_me" class="ml-2 block text-sm text-gray-900">
                        Remember me
                    </label>
                </div>
            </div>

            <div class="flex items-center justify-center">
                <button
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition duration-150 ease-in-out"
                    type="submit">
                    Sign In
                </button>
            </div>

            <!-- Hidden input required by Django -->
            <input type="hidden" name="next" value="{{ next }}">
        </form>

        <div class="mt-6 text-center text-xs text-gray-400">
            &copy; 2026 plasmaERP. All rights reserved.
        </div>
    </div>

</body>

</html>
