{% extends 'base/base.html' %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div>
        <h2 class="text-2xl font-semibold text-gray-800">Designations</h2>
        <p class="text-sm text-gray-500">Manage company designations</p>
    </div>
    <a href="{% url 'hrm:designation_add' %}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium">
        + Add Designation
    </a>
</div>

<div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full whitespace-nowrap">
            <thead>
                <tr class="bg-gray-50 border-b border-gray-200 text-left text-xs font-semibold text-gray-500 uppercase">
                    <th class="px-6 py-4">Designation Name</th>
                    <th class="px-6 py-4">Department</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                {% for designation in designations %}
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">{{ designation.name }}</td>
                    <td class="px-6 py-4 text-sm text-gray-600 truncate max-w-xs">{{ designation.department.name }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="px-6 py-8 text-center text-gray-500">No designations found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
