{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center mb-6">
        <a href="{% url 'hrm:designation_list' %}" class="text-blue-600 hover:text-blue-800 mr-4">&larr; Back to Designations</a>
        <h2 class="text-2xl font-semibold text-gray-800">{% if form.instance.pk %}Edit{% else %}Add{% endif %} Designation</h2>
    </div>

    <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
        <form method="POST" class="p-8">
            {% csrf_token %}
            <h3 class="text-lg font-medium text-gray-900 border-b pb-2 mb-6">Designation Information</h3>
            <div class="grid grid-cols-1 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Designation Name</label>
                    {{ form.name }}
                    <span class="text-xs text-red-500">{{ form.name.errors }}</span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                    {{ form.department }}
                    <span class="text-xs text-red-500">{{ form.department.errors }}</span>
                </div>
            </div>
            <div class="flex justify-end pt-4 border-t border-gray-200">
                <a href="{% url 'hrm:designation_list' %}" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 mr-3">Cancel</a>
                <button type="submit" class="bg-blue-600 text-white rounded-md shadow-sm py-2 px-4 text-sm font-medium hover:bg-blue-700">Save Designation</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
